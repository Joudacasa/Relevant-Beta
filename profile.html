<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Relevant beta | Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .banner { height: 200px; background: #233023; border-radius: 12px 12px 0 0; background-size: cover; }
        .avatar-box { padding: 20px; margin-top: -60px; }
        .avatar { width: 100px; height: 100px; border-radius: 12px; border: 4px solid var(--bg-panel); background: #444; }
    </style>
</head>
<body>
    <div class="container" style="grid-template-columns: 300px 800px;">
        <aside>
            <nav class="nav-menu">
                <a href="feed.html">Back to Home</a>
            </nav>
        </aside>
        <main class="timeline">
            <div class="banner" id="profile-banner"></div>
            <div class="avatar-box">
                <img src="https://via.placeholder.com/100" class="avatar" id="profile-avatar">
                <h2 style="margin: 10px 0 0 0;">Username</h2>
                <p style="color: var(--text-dim);">@handle</p>
                <a href="settings.html" class="btn-relevant" style="text-decoration: none; font-size: 0.8em;">Edit Profile</a>
            </div>
            <div class="timeline-header">Posts</div>
        </main>
    </div>
</body>
</html>
