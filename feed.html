<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Relevant beta | Feed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar-left">
            <h2 style="color: var(--primary);">Relevant Beta</h2>
            <nav class="nav-menu">
                <a href="feed.html" class="active">Home</a>
                <a href="profile.html">Profile</a>
                <a href="settings.html">Settings</a> </nav>
            
            <div id="posting-area" class="compose-box">
                <textarea id="post-text" placeholder="What's on your mind?"></textarea>
                <button class="btn-relevant" onclick="sendPost()">Post</button>
            </div>
        </aside>

        <main class="timeline">
            <div id="feed-container">
                </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        // Bloqueio de Convidado e Carregamento
        document.addEventListener("DOMContentLoaded", async () => {
            const isGuest = localStorage.getItem('relevant_guest') === 'true';
            if (isGuest) {
                document.getElementById('posting-area').innerHTML = "<p style='color: #444;'>Sign in to post updates.</p>";
            }
            fetchPosts();
        });

        async function fetchPosts() {
            const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('feed-container');
            if (data) {
                container.innerHTML = data.map(p => `
                    <div class="post-card">
                        <b>User</b>
                        <p>${p.content}</p>
                    </div>
                `).join('');
            }
        }

        async function sendPost() {
            const content = document.getElementById('post-text').value;
            const user = await getCurrentUser();
            if(!user) return alert("Please log in");

            const { error } = await supabase.from('posts').insert([{ content: content, user_id: user.id }]);
            if (!error) {
                document.getElementById('post-text').value = '';
                fetchPosts();
            }
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
